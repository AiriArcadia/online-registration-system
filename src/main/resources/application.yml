server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: online-registration-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/registration_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Shanghai}
    date-format: ${APP_DATE_FORMAT:yyyy-MM-dd HH:mm:ss}
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.jdbc.core.JdbcTemplate: ${LOG_LEVEL_JDBC:INFO}
