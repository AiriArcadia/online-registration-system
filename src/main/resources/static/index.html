<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线活动报名系统</title>
  <style>
    body{font-family:Arial, "Microsoft YaHei", sans-serif; margin:40px; line-height:1.7}
    code{background:#f4f4f4; padding:2px 6px; border-radius:4px}
  </style>
</head>
<body>
<h1>在线活动报名系统（JMeter实验版）</h1>
<p>这是一个用于性能测试教学的后端系统，建议直接通过 Postman 或 JMeter 访问以下接口：</p>
<ul>
  <li><code>POST /api/auth/login</code></li>
  <li><code>GET /api/activity/list</code></li>
  <li><code>GET /api/activity/detail?id=1</code></li>
  <li><code>POST /api/register</code></li>
  <li><code>GET /api/register/count?id=1</code></li>
</ul>
</body>
</html>
